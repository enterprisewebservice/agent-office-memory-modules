apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: memorymodules.agentoffice.ai
spec:
  group: agentoffice.ai
  names:
    kind: MemoryModule
    listKind: MemoryModuleList
    singular: memorymodule
    plural: memorymodules
    shortNames: ["mm"]
    categories:
      - agent-office
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [kind, filename, source]
              properties:
                kind:
                  description: |
                    Module kind. Maps to the canonical filename the OpenClaw
                    runtime expects in /workspace/workspace, and to the AAIF /
                    Linux Foundation cross-tool conventions where applicable.
                  type: string
                  enum: [agents, user, tools, identity, soul, skill, custom]
                filename:
                  description: |
                    Filename the module's content lands as inside the
                    rendered per-agent ConfigMap. For `kind: agents` use
                    `AGENTS.md` (AAIF universal). For `kind: skill` use
                    `SKILL_<name>.md` (Anthropic Skills Open Standard,
                    unpacked by the OpenClaw init container into
                    skills/<name>/SKILL.md). For OpenClaw-internal kinds
                    (user/tools/identity/soul) use the matching .md filename.
                  type: string
                version:
                  description: Semver version of the module content. Optional in v1alpha1; recorded in status when present.
                  type: string
                description:
                  description: Human-readable description of when to use this module.
                  type: string
                source:
                  description: Where the module content lives. Exactly one of (configMapRef|inline) must be set.
                  type: object
                  properties:
                    configMapRef:
                      description: Reference to a ConfigMap whose `data[key]` holds the module's .md content. Typical pattern is a kustomize-generated CM in the same namespace.
                      type: object
                      required: [name, key]
                      properties:
                        name:
                          type: string
                        key:
                          type: string
                    inline:
                      description: Inline .md content. For small or one-off modules. Larger / authored content should use configMapRef so it lives in a real .md file in git.
                      type: string
            status:
              type: object
              properties:
                contentSha256:
                  description: SHA-256 of the resolved content the controller last observed. Updated each reconcile.
                  type: string
                referencedBy:
                  description: AgentWorkstation names whose spec.memory.modules currently reference this module. Maintained by the controller.
                  type: array
                  items:
                    type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
      additionalPrinterColumns:
        - name: Kind
          type: string
          jsonPath: .spec.kind
        - name: Filename
          type: string
          jsonPath: .spec.filename
        - name: Version
          type: string
          jsonPath: .spec.version
        - name: ReferencedBy
          type: integer
          jsonPath: .status.referencedBy
          description: Number of agents currently referencing this module
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
